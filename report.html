<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงผลตรวจ ลบบรรทัดว่าง ตรวจแกรมม่า</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .box {
            flex: 1;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-clean { background-color: #2ecc71; }
        .btn-clean:hover { background-color: #27ae60; }
        .btn-grammar { background-color: #9b59b6; }
        .btn-grammar:hover { background-color: #8e44ad; }
        .btn-copy { background-color: #3498db; }
        .btn-copy:hover { background-color: #2980b9; }
        .btn-clear { background-color: #e74c3c; }
        .btn-clear:hover { background-color: #c0392b; }
        
        /* ส่วนแสดงผลการตรวจแกรมม่า */
        #resultLog {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
        .error-item {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ccc;
        }
        .error-text { color: #c0392b; font-weight: bold; }
        .suggest-text { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h2>ลงผลตรวจ ลบบรรทัดว่าง ตรวจแกรมม่า</h2>
    
    <div class="container">
        <div class="box">
            <label for="inputText">**วางข้อความที่นี่:**</label>
            <textarea id="inputText" spellcheck="true" placeholder="วางข้อความตรงนี้..."></textarea>
        </div>
        <div class="box">
            <label for="outputText">**ผลลัพธ์หลังจัดแต่ง:**</label>
            <textarea id="outputText" placeholder="ผลลัพธ์จะแสดงตรงนี้..." readonly></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-clean" onclick="cleanText()">✨ 1. ลบบรรทัดว่าง</button>
        <button class="btn-grammar" onclick="checkGrammar()">🔍 2. ตรวจแกรมม่า (ENG)</button>
        <button class="btn-copy" onclick="copyText()">📋 ก๊อปปี้ผลลัพธ์</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ ล้างทั้งหมด</button>
    </div>

    ### 📝 รายงานการตรวจแกรมม่า
    <div id="resultLog">ยังไม่มีการตรวจแกรมม่า (กดปุ่ม "ตรวจแกรมม่า" หลังจากลบบรรทัดว่างแล้ว)</div>

    <script>
        function cleanText() {
            const input = document.getElementById('inputText').value;
            const cleaned = input
                .split('\n')
                .map(line => line.trim())
                .filter(line => line !== '')
                .join('\n');

            document.getElementById('outputText').value = cleaned;
        }

        // ฟังก์ชันเชื่อมต่อ API ของ LanguageTool เพื่อตรวจแกรมม่าภาษาอังกฤษ
        async function checkGrammar() {
            const textToCheck = document.getElementById('outputText').value || document.getElementById('inputText').value;
            const logDiv = document.getElementById('resultLog');
            
            if (!textToCheck.trim()) {
                alert('กรุณาใส่ข้อความก่อนตรวจแกรมม่าครับ');
                return;
            }

            logDiv.innerHTML = "⏳ กำลังตรวจสอบแกรมม่า กรุณารอสักครู่...";

            try {
                // เรียกใช้ Free API ของ LanguageTool
                const response = await fetch('https://api.languagetool.org/v2/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'text': textToCheck,
                        'language': 'en-US' // ตั้งค่าเป็นภาษาอังกฤษ
                    })
                });

                const data = await response.json();
                displayErrors(data.matches);

            } catch (error) {
                logDiv.innerHTML = "❌ ไม่สามารถเชื่อมต่อระบบตรวจแกรมม่าได้ (โปรดเช็คอินเทอร์เน็ต)";
                console.error(error);
            }
        }

        // แสดงผลลัพธ์ที่ตรวจเจอ
        function displayErrors(matches) {
            const logDiv = document.getElementById('resultLog');
            if (matches.length === 0) {
                logDiv.innerHTML = "✅ **ยอดเยี่ยม!** ไม่พบข้อผิดพลาดทางแกรมม่าพื้นฐานในข้อความนี้";
                return;
            }

            let html = `⚠️ พบจุดที่น่าจะผิดทั้งหมด <b>${matches.length}</b> จุด:<br><br>`;
            matches.forEach((match, index) => {
                const context = match.context.text;
                const offset = match.context.offset;
                const length = match.context.length;
                
                // ไฮไลต์คำที่ผิด
                const errorWord = context.substring(offset, offset + length);
                
                // ดึงคำแนะนำคำที่ถูก (ถ้ามี)
                const suggestions = match.replacements.slice(0, 3).map(r => r.value).join(', ');

                html += `
                    <div class="error-item">
                        <b>จุดที่ ${index + 1}:</b> ${match.message}<br>
                        คำที่ผิด: <span class="error-text">"${errorWord}"</span> 
                        ${suggestions ? `| คำที่แนะนำ: <span class="suggest-text">${suggestions}</span>` : ''}
                    </div>
                `;
            });
            logDiv.innerHTML = html;
        }

        function copyText() {
            const outputText = document.getElementById('outputText');
            if (!outputText.value) {
                alert('ไม่มีข้อความให้ก๊อปปี้ครับ');
                return;
            }
            outputText.select();
            document.execCommand('copy');
            alert('ก๊อปปี้ข้อความเรียบร้อยแล้ว! 📋');
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
            document.getElementById('resultLog').innerHTML = 'ยังไม่มีการตรวจแกรมม่า';
        }
    </script>

</body>
</html>
